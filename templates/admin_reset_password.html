<!-- admin_reset_password.html — admin-only password reset -->
{% extends "base.html" %}

{% block content %}
  <div class="card">
    <h1>Reset Password (Admin)</h1>
    <p>Generate a new temporary password for a user.</p>

    <form class="form" method="post" action="{{ url_for('admin_reset_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <div class="label">Username</div>
        <input class="input" name="username" placeholder="e.g. fatima-1234" required />
      </div>

      <button class="btn" type="submit">Reset Password</button>
    </form>
  </div>
{% endblock %}
