<!-- admin_reset_password_success.html — shows reset credentials once -->
{% extends "base.html" %}

{% block content %}
  <div class="card">
    <h1>Password Reset</h1>
    <p>These details are shown once. Share them securely.</p>

    <div class="card mt-14">
      <p><strong>Username:</strong> {{ reset_username }}</p>
      <p><strong>Temporary Password:</strong> {{ temp_password }}</p>
      <p class="muted">User should log in and change their password immediately.</p>
    </div>

    <div class="actions mt-14">
      <a class="btn" href="{{ url_for('patients') }}">Back to Patients</a>
      <a class="btn btn--ghost" href="{{ url_for('admin_reset_password') }}">Reset Another</a>
    </div>
  </div>
{% endblock %}
