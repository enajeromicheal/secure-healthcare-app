<!-- change_password.html — allows logged-in users to change their password -->
{% extends "base.html" %}

{% block content %}
  <div class="card">
    <h1>Change Password</h1>
    <p>Update your password (recommended after receiving a temporary password).</p>

    <form class="form" method="post" action="{{ url_for('change_password') }}">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div>
        <div class="label">Current Password</div>
        <input class="input" type="password" name="current_password" autocomplete="current-password" required />
      </div>

      <div>
        <div class="label">New Password</div>
        <input class="input" type="password" name="new_password" autocomplete="new-password" required />
      </div>

      <div>
        <div class="label">Confirm New Password</div>
        <input class="input" type="password" name="confirm_password" autocomplete="new-password" required />
      </div>

      <button class="btn" type="submit">Update Password</button>
    </form>
  </div>
{% endblock %}
